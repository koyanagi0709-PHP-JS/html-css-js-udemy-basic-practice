<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>HTMLを勉強しています</title>
        <meta name="description" content="基本的なHTML文書です。">
        <style>
            body{background: lightyellow;}
        </style>
        <!-- <link rel="stylesheet" href="style.css"> -->
    </head>
    <body>
        <header>
            <h1>ヘッダー</h1>
            <nav>
                <li>HOME</li>
                <li>新着情報</li>
            </nav>
        </header>
        <section>
            <h1>HTML5でサイトをつくろう</h1>
            <p>HTML5を学習して、サンプルサイトを完成しよう。</p>
            <!-- 見出しのある情報コンテンツ、セクションを表す -->
            <!-- section要素について文法は間違っていなくても、スタイル目的でsection要素を多用しないその場合divを使用する -->
        </section>
        <article>
            <!-- 独立しているコンテンツセクションに用いる -->
             <h1>HTML5の要素</h1>
             <section>
                <h2>HTML5で追加された要素</h2>
                <p>header要素、footer要素、nav要素などがあります。</p>
             </section>
             <section>
                <h2>HTML5で廃止された要素</h2>
                <p>center要素、font要素、frame要素などがあります。</p>
             </section>
        </article>
        <aside>
            <!-- 副次的なコンテンツ サイドバーや広告などが使われる -->
            <h2>オススメリンク</h2>
            <ul>
                <li><a href="#">Google</a></li>
                <li><a href="#">Yahoo</a></li>
            </ul>
        </aside>
        <p>基本的なHTMLです。</p>
        <!-- コメント -->
         <footer></footer>
    </body>
</html>
